## Application Name
spring.application.name=video-max

#Spring Config Properties
spring.config.import=optional:file:.env[.properties]

#Application Port
server.port=${PORT}

# RabbitMQ Host Configuration
spring.rabbitmq.host=${RABBITMQ_HOST}

# Datasource Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.database.name=${DB_NAME}
spring.jpa.database=POSTGRESQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Management Multipart File Images
minio.server.url=${MINIO_URL}
#minio.access-key=${ACCESS_KEY}
#minio.secret-key=${SECRET_KEY}
#minio.bucket.name=${BUCKET_NAME}

# Management Connection Database
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.idleTimeout=180000
spring.datasource.hikari.minimumIdle=5
spring.datasource.hikari.leakDetectionThreshold=240000
logging.level.com.zaxxer.hikari=TRACE
spring.datasource.hikari.connectionTimeout=30000
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG

# Management Application Metrics Exposure
management.endpoints.web.exposure.include=*

# Multipart File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1000MB
spring.servlet.multipart.max-request-size=1000MB
