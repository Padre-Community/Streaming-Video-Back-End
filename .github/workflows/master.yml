name: Docker Deploy Image

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install -DskipTests

  package:
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'

      - name: Package Application App
        run: mvn -B package --file pom.xml -DskipTests

  test:
    needs: [ package ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'

      - name: Test Application App
        run: mvn clean install

  deploy:
    needs: [ test ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify Release O.S
        run: curl -fsSL https://raw.githubusercontent.com/ivancarlosantos/installer/refs/heads/master/release.sh | sh

      - name: List Files to Deploy
        run: ls -lha

      - name: Login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/stream-x .

      - name: Tag Docker Image
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/stream-x ${{ secrets.DOCKER_USERNAME }}/stream-x:production

      - name: Publish Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/stream-x