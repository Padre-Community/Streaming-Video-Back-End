name: Develop Branch Pipeline

on:
  push:
    branches:
      - develop

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Java 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile and Package
        run: mvn clean compile -B

      - name: Upload target folder
        uses: actions/upload-artifact@v7.0.1
        with:
          name: target-artifact
          path: target/
          retention-days: 1

  lint:
    name: Lint Code
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Linter / Style Check
        run: mvn clean install

  unit-test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Java 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Tests
        run: mvn test -B

  integration-test:
    name: Integration Tests
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Java 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Integration Tests
        run: mvn verify -DskipUnitTests -B

  arch-test:
    name: Architecture Tests
    needs: integration-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Java 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run ArchUnit Tests
        run: mvn test -Dtest=*ArchTest -B

  echo-info:
    name: Pipeline Summary Info
    needs: arch-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print Execution Details
        run: |
          echo "============================================="
          echo " PIPELINE EXECUTION SUMMARY"
          echo "============================================="
          echo "Branch:           ${{ github.ref_name }}"
          echo "Triggered by:     ${{ github.actor }}"
          echo "Pipeline Status:  ${{ needs.arch-test.result == 'success' && 'SUCCESS' || 'FAILED' }}"
          echo "============================================="