name: CI Pipeline

on:
  push:
    branches: [ develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Compile
        run: mvn compile
      - name: Upload target directory
        uses: actions/upload-artifact@v4
        with:
          name: target
          path: target/

  lint:
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Download target
        uses: actions/download-artifact@v4
        with:
          name: target
          path: target/
      - name: Run Checkstyle
        run: mvn checkstyle:check

  unit-test:
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Download target
        uses: actions/download-artifact@v4
        with:
          name: target
          path: target/
      - name: Run unit tests
        run: mvn test -Dfailsafe.skip=true

  integration-test:
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Download target
        uses: actions/download-artifact@v4
        with:
          name: target
          path: target/
      - name: Run integration tests
        run: mvn verify -Dsurefire.skip=true

  arch-test:
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Download target
        uses: actions/download-artifact@v4
        with:
          name: target
          path: target/
      - name: Run architecture tests
        run: mvn test -Dtest=*ArchTest -Dfailsafe.skip=true

  echo-info:
    runs-on: ubuntu-latest
    needs: [build, lint, unit-test, integration-test, arch-test]
    if: always()
    steps:
      - name: Print info
        run: |
          echo "Branch name: ${{ github.ref_name }}"
          echo "Git username: ${{ github.actor }}"
          echo "Status of build: ${{ needs.build.result }}"
          echo "Status of lint: ${{ needs.lint.result }}"
          echo "Status of unit-test: ${{ needs.unit-test.result }}"
          echo "Status of integration-test: ${{ needs.integration-test.result }}"
          echo "Status of arch-test: ${{ needs.arch-test.result }}"
          # Status geral
          if [[ "${{ needs.build.result }}" == "success" && \
                "${{ needs.lint.result }}" == "success" && \
                "${{ needs.unit-test.result }}" == "success" && \
                "${{ needs.integration-test.result }}" == "success" && \
                "${{ needs.arch-test.result }}" == "success" ]]; then
            echo "Overall status: success"
          else
            echo "Overall status: failure"
          fi