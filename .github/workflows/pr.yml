name: Pull Request Contribution [PRC]

on:
  push:
    branches: [ feature/** ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install -DskipTests

  unit-tests:
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests (surefire)
        run: mvn test -DskipITs -B -e

      - name: Upload unit test results (JUnit)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: target/surefire-reports/*.xml

      - name: Upload JaCoCo exec file (unit tests)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-unit
          path: target/jacoco.exec

  jacoco-report:
    needs: [ unit-tests ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Merge exec files
        run: mvn jacoco:merge -Djacoco.destFile=target/jacoco.exec

      - name: Generate report
        run: mvn jacoco:report -Djacoco.dataFile=target/jacoco.exec

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (compile)
        run: mvn compile -DskipTests -B -e

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dependency-check:
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check

      - name: Upload Dependency Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html

      - name: Notify Discord Success Deploy
        if: success()
        uses: appleboy/discord-action@v1.2.0
        with:
          webhook_id: ${{ secrets.WEBHOOK_ID }}
          webhook_token: ${{ secrets.WEBHOOK_TOKEN }}
          color: "#48f442"
          username: ${{ github.actor }}
          message: ":rocket: Send a new commit\n[Ver Commit] ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"

      - name: Notify Discord Failure Deploy
        if: failure()
        uses: appleboy/discord-action@v1.2.0
        with:
          webhook_id: ${{ secrets.WEBHOOK_ID }}
          webhook_token: ${{ secrets.WEBHOOK_TOKEN }}
          color: "#b81d1d"
          username: ${{ github.actor }}
          message: ":triumph: Algo deu errado meu caro :triumph:\nRevise o que aconteceu e envie novamente"