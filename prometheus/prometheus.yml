global:
  scrape_interval: 15s
  evaluation_interval: 15s
scrape_configs:
  - job_name: 'steamx-backend'
    scrape_interval: 5s
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'host.docker.internal:8080' ]
        labels:
          application: 'steamx-backend'

  - job_name: 'prometheus'
    scrape_interval: 5s
    metrics_path: '/metrics'
    static_configs:
      - targets: [ 'host.docker.internal:9090' ]
        labels:
          application: 'prometheus'

  - job_name: 'cadvisor'
    scrape_interval: 5s
    static_configs:
      - targets: [ 'host.docker.internal:8083' ]
        labels:
          application: 'cadvisor'
